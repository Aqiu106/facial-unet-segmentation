data_dir: data
output_root: unet_model

image_size: 256
batch_size: 8
num_workers: 4
seed: 42
device: cuda

use_amp: true
resume_from: auto

bilinear: true
use_attention: true
attention_mode: concatenation
attention_dsample: [2, 2]
base_channels: 64
block_type: residual       # double_conv / residual
norm_type: group           # batch / group
bottleneck_context: true
deep_supervision: true
aux_loss_weight: 0.2

num_epochs: 50
learning_rate: 0.0001
weight_decay: 0.0001
optimizer: adam
criterion: focal_dice

focal_alpha: null
focal_gamma: 2.0
dice_weight: 0.4
focal_weight: 0.6

save_interval: 5
visualize_interval: 10
visualize_predictions: true
early_stop_patience: 10

visualize_train_samples: false
visualize_num_samples: 3
